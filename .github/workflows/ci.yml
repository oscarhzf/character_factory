name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - codex-sprint0-sprint1-mvp

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: character_factory_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d character_factory_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/character_factory_test
      TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/character_factory_test
      REDIS_URL: ""
      STORAGE_PROVIDER: ""
      STORAGE_ENDPOINT: ""
      STORAGE_BUCKET: ""
      STORAGE_ACCESS_KEY_ID: ""
      STORAGE_SECRET_ACCESS_KEY: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run lint
        run: pnpm lint

      - name: Run typecheck
        run: pnpm typecheck

      - name: Run tests
        run: pnpm test

      - name: Build web app
        run: pnpm --filter @character-factory/web build
